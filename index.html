<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="S2 Formation"/>
<meta name="theme-color" content="#0d1f35"/>
<title>S2 Formation — Tests Pratiques</title>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--dark:#0d1f35;--mid:#1a3454;--btn:#1e4068;--btn-h:#254d7d;--accent:#2a5fa0;--sep:rgba(255,255,255,0.15);--muted:rgba(255,255,255,0.55);--ibg:rgba(255,255,255,0.08);--iborder:rgba(255,255,255,0.2);}
html,body{height:100%;background:var(--dark);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;overflow:hidden;}
.app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 80px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--mid);border-bottom:1px solid var(--sep);flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:10px;}
.logo-wrap{width:36px;height:36px;background:var(--btn);border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-title{font-size:13px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.05em;}
.tb-sub{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:1px;}
.conn-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid;white-space:nowrap;text-transform:uppercase;letter-spacing:0.04em;}
.online{color:#4ade80;background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);}
.offline{color:#f87171;background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);}
.cdot{width:6px;height:6px;border-radius:50%;}
.online .cdot{background:#4ade80;}
.offline .cdot{background:#f87171;}
.back-topbtn{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:0;}
.back-topbtn:hover{color:#fff;}
.sep-row{display:flex;align-items:center;gap:10px;margin:22px 0 16px;}
.sep-row::before,.sep-row::after{content:'';flex:1;height:1px;background:var(--sep);}
.sep-txt{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;}
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mod-btn{background:var(--btn);border:none;border-radius:8px;padding:16px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#fff;width:100%;text-align:left;transition:background 0.15s;-webkit-tap-highlight-color:rgba(255,255,255,0.1);}
.mod-btn:hover:not(.dis){background:var(--btn-h);}
.mod-btn:active:not(.dis){background:var(--btn-h);}
.mod-btn.dis{opacity:0.35;cursor:not-allowed;pointer-events:none;}
.mod-btn.full{grid-column:1/-1;}
.mod-btn *{pointer-events:none;}
.mod-label{font-size:16px;font-weight:700;color:#fff;}
.mod-sub{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.04em;}
.wip-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,0.1);color:var(--muted);padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;flex-shrink:0;}
.drive-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,0.05);border:1px solid var(--sep);border-radius:8px;padding:10px 14px;margin-bottom:12px;}
.drive-bar-info{display:flex;align-items:center;gap:8px;}
.drive-bar-txt{font-size:11px;color:var(--muted);}
.drive-bar-name{font-size:11px;font-weight:700;color:#fff;}
.drive-connect-btn{font-size:10px;font-weight:700;padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;flex-shrink:0;}
.drive-connect-btn:hover{background:rgba(255,255,255,0.18);}
.drive-connect-btn.connected{border-color:rgba(74,222,128,0.4);background:rgba(34,197,94,0.12);color:#4ade80;}
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.stat-card{background:var(--btn);border-radius:6px;padding:10px 6px;text-align:center;}
.stat-num{font-size:20px;font-weight:700;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.fbtn{font-size:10px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--sep);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:0.05em;}
.fbtn.active{background:#fff;color:var(--dark);border-color:#fff;}
.test-card{background:var(--btn);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;transition:border-color 0.15s;display:flex;align-items:center;gap:10px;}
.test-card:hover{border-color:var(--accent);}
.tc-info{flex:1;min-width:0;}
.tc-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.tc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.spill{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;}
.s-draft{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);}
.s-pending{background:rgba(245,158,11,0.18);color:#fbbf24;}
.s-syncing{background:rgba(96,165,250,0.18);color:#93c5fd;}
.s-synced{background:rgba(34,197,94,0.15);color:#4ade80;}
.s-error{background:rgba(239,68,68,0.15);color:#f87171;}
.rpill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;}
.r-admis{background:rgba(34,197,94,0.15);color:#4ade80;}
.r-refuse{background:rgba(239,68,68,0.15);color:#f87171;}
.r-none{background:rgba(255,255,255,0.06);color:var(--muted);}
.ibt{width:28px;height:28px;border:1px solid var(--sep);border-radius:6px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background 0.15s;}
.ibt:hover{background:rgba(255,255,255,0.12);}
.ibt.del:hover{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.4);}
.fab{position:fixed;bottom:24px;right:16px;width:52px;height:52px;border-radius:50%;background:#fff;color:var(--dark);border:none;font-size:28px;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.fab:hover{background:#e2e8f0;}
.sync-bar{background:rgba(255,255,255,0.05);border:1px solid var(--sep);border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,0.1);border-top-color:#60a5fa;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.fsec{background:var(--btn);border-radius:8px;padding:14px 16px;margin-bottom:10px;}
.fsec-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:12px;}
.frow{display:flex;gap:8px;margin-bottom:10px;}
.frow:last-child{margin-bottom:0;}
.ffield{margin-bottom:10px;}
.ffield:last-child{margin-bottom:0;}
.ffield label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:4px;}
.ffield input,.ffield select{width:100%;background:var(--ibg);border:1px solid var(--iborder);border-radius:6px;color:#fff;padding:9px 10px;font-size:13px;font-family:inherit;-webkit-appearance:none;}
.ffield input::placeholder{color:rgba(255,255,255,0.25);}
.ffield select option{background:var(--mid);color:#fff;}
.tbadge{display:inline-block;font-size:9px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em;}
.tb-blue{background:rgba(96,165,250,0.2);color:#93c5fd;}
.tb-amber{background:rgba(251,191,36,0.2);color:#fbbf24;}
.tb-green{background:rgba(34,197,94,0.2);color:#4ade80;}
.tb-red{background:rgba(239,68,68,0.2);color:#f87171;}
.tb-purple{background:rgba(167,139,250,0.2);color:#c4b5fd;}
.crit-row{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--sep);}
.crit-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.crit-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.crit-name{flex:1;font-size:12px;font-weight:500;line-height:1.4;}
.note-disp{display:inline-flex;align-items:center;justify-content:center;width:46px;height:32px;border:1px solid var(--sep);border-radius:6px;font-size:14px;font-weight:700;transition:color 0.15s,border-color 0.15s;}
.note-max{font-size:11px;color:var(--muted);}
.pen-row{display:flex;align-items:center;gap:6px;}
.pen-lbl{font-size:10px;color:var(--muted);flex:1;}
.pbn{width:28px;height:28px;border:1px solid var(--sep);border-radius:5px;background:rgba(255,255,255,0.06);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pbn:hover{background:rgba(255,255,255,0.12);}
.pen-count{font-size:12px;font-weight:700;min-width:14px;text-align:center;color:#f87171;}
.sbar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-top:6px;}
.sfill{height:100%;border-radius:2px;transition:width 0.2s;}
.tot-sec{background:var(--btn);border-radius:8px;padding:14px 16px;margin-bottom:10px;}
.tot-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tot-lbl{font-size:12px;color:var(--muted);}
.tot-val{font-size:14px;font-weight:700;transition:color 0.15s;}
.grand-num{font-size:30px;font-weight:700;}
.res-badge{font-size:12px;font-weight:700;padding:6px 16px;border-radius:6px;text-transform:uppercase;letter-spacing:0.05em;}
.rb-admis{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
.rb-refuse{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.seuil-txt{font-size:10px;color:var(--muted);margin-top:4px;}
.act-row{display:flex;gap:8px;margin-bottom:1rem;}
.abtn{flex:1;padding:12px 0;font-size:11px;font-weight:700;border-radius:6px;cursor:pointer;border:1px solid var(--sep);background:rgba(255,255,255,0.06);color:#fff;text-transform:uppercase;letter-spacing:0.05em;transition:background 0.15s;}
.abtn:hover{background:rgba(255,255,255,0.12);}
.abtn.primary{background:#fff;color:var(--dark);border-color:#fff;flex:2;}
.abtn.primary:hover{background:#e2e8f0;}
.abtn.primary:disabled{opacity:0.3;cursor:not-allowed;}
.theme-check-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0;border-bottom:1px solid var(--sep);}
.theme-check-row:last-child{border-bottom:none;}
.theme-check-row input[type=checkbox]{width:18px;height:18px;accent-color:#60a5fa;flex-shrink:0;}
.testeur-card{background:var(--btn);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid transparent;transition:border-color 0.15s;}
.testeur-card:hover{border-color:var(--accent);}
.testeur-avatar{width:40px;height:40px;border-radius:50%;background:rgba(96,165,250,0.2);border:1px solid rgba(96,165,250,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#93c5fd;flex-shrink:0;}
.testeur-info{flex:1;min-width:0;}
.testeur-name{font-size:14px;font-weight:700;color:#fff;}
.testeur-sig{font-size:10px;color:var(--muted);margin-top:2px;}
.sig-preview{width:80px;height:32px;border:1px solid var(--sep);border-radius:4px;background:rgba(255,255,255,0.04);object-fit:contain;flex-shrink:0;}
.sig-placeholder{width:80px;height:32px;border:1px dashed var(--sep);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0;}
.sig-pad-wrap{background:var(--btn);border-radius:8px;padding:14px;margin-bottom:10px;}
.sig-pad-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;}
.sig-canvas{width:100%;height:160px;background:#fff;border-radius:6px;touch-action:none;display:block;cursor:crosshair;}
.sig-actions{display:flex;gap:8px;margin-top:8px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.show{display:flex;}
.modal{background:var(--mid);border-radius:12px;border:1px solid var(--sep);padding:1.5rem;max-width:320px;width:100%;}
.modal h3{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.modal p{font-size:12px;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;}
.modal-acts{display:flex;gap:8px;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:13px;line-height:1.7;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.95);color:var(--dark);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="topbar">
    <div class="tb-left">
      <div class="logo-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
      <div><div class="tb-title">Tests pratiques</div><div class="tb-sub">S2 Formation</div></div>
    </div>
    <div class="conn-pill online" id="cp-home"><div class="cdot"></div><span id="cl-home">En ligne</span></div>
  </div>
  <div class="scroll">
    <div class="sep-row"><span class="sep-txt">Autorisation de conduite</span></div>
    <div class="mod-grid">
      <button class="mod-btn dis"><div class="mod-label">R482</div><span class="wip-badge">Bientôt</span></button>
      <button class="mod-btn dis"><div class="mod-label">R484</div><span class="wip-badge">Bientôt</span></button>
      <button class="mod-btn dis"><div class="mod-label">R485</div><span class="wip-badge">Bientôt</span></button>
      <button class="mod-btn dis"><div class="mod-label">R486</div><span class="wip-badge">Bientôt</span></button>
      <button class="mod-btn dis"><div class="mod-label">R489</div><span class="wip-badge">Bientôt</span></button>
      <button class="mod-btn dis"><div class="mod-label">R490</div><span class="wip-badge">Bientôt</span></button>
    </div>
    <div class="sep-row"><span class="sep-txt">Formations annexes</span></div>
    <button class="mod-btn full" id="btn-th" style="margin-bottom:10px">
      <div><div class="mod-label">Travail en hauteur</div><div class="mod-sub">Test pratique · Seuil 35/50</div></div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="mod-btn full" id="btn-echaf" style="margin-bottom:10px">
      <div><div class="mod-label">Échafaudages</div><div class="mod-sub">R408 &amp; R457 · Seuil par thème</div></div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="mod-btn full dis"><div class="mod-label">Habilitation électrique</div><span class="wip-badge">Bientôt</span></button>
    <div class="sep-row"><span class="sep-txt">Testeurs</span></div>
    <button class="mod-btn full" id="btn-testeurs" style="margin-bottom:16px">
      <div><div class="mod-label">Modifier la liste</div><div class="mod-sub">Noms, prénoms &amp; signatures</div></div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<!-- LIST (générique) -->
<div id="s-list" class="screen">
  <div class="topbar">
    <div class="tb-left">
      <button class="back-topbtn" onclick="showScreen('s-home')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Accueil
      </button>
    </div>
    <div class="conn-pill online" id="cp-list"><div class="cdot"></div><span id="cl-list">En ligne</span></div>
  </div>
  <div class="scroll">
    <div class="drive-bar">
      <div class="drive-bar-info">
        <svg width="16" height="16" viewBox="0 0 87.3 78" fill="none"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L27.5 53H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="M43.65 25L29.9 1.4C28.55.55 27 0 25.35 0c-1.65 0-3.2.55-4.55 1.4l-16.7 29.2C2.3 32.2 1.2 34.5 1.2 37H27.5z" fill="#00ac47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H60.1l5.45 10.25z" fill="#ea4335"/><path d="M43.65 25L57.4 1.4C56.05.55 54.5 0 52.85 0H34.45c-1.65 0-3.2.55-4.55 1.4z" fill="#00832d"/><path d="M60.1 53H27.5L13.75 76.8c1.35.85 2.9 1.2 4.55 1.2h50.7c1.65 0 3.2-.35 4.55-1.2z" fill="#2684fc"/><path d="M73.4 26.6l-12.85-22.2C59.2 2.95 58.05 1.85 56.7 1L43.65 25l16.45 28H87.3c0-2.5-1.1-4.8-2.85-6.4z" fill="#ffba00"/></svg>
        <div><div id="list-drive-txt" class="drive-bar-txt">Google Drive non connecté</div><div id="list-drive-name" class="drive-bar-name" style="display:none"></div></div>
      </div>
      <button class="drive-connect-btn" id="list-drive-btn" onclick="handleDriveAuth()">Connecter</button>
    </div>
    <div id="list-sync-bar" style="display:none" class="sync-bar"><div class="spin"></div><span id="list-sync-msg">Envoi en cours...</span></div>
    <div class="stats-grid" id="list-stats"></div>
    <!-- Bouton envoyer tout -->
    <button class="abtn primary" id="send-all-btn" onclick="sendAll()" style="margin-bottom:14px;display:none">
      Envoyer tout sur Drive &amp; par mail
    </button>
    <div class="filter-row">
      <button class="fbtn active" onclick="setModuleFilter('tous',this)">Tous</button>
      <button class="fbtn" onclick="setModuleFilter('draft',this)">En cours</button>
      <button class="fbtn" onclick="setModuleFilter('pending',this)">En attente</button>
      <button class="fbtn" onclick="setModuleFilter('synced',this)">Synchronisés</button>
    </div>
    <div id="list-tests"></div>
  </div>
  <button class="fab" id="list-fab" onclick="openNewTest()">+</button>
</div>

<!-- FORM (générique) -->
<div id="s-form" class="screen">
  <div class="topbar">
    <div class="tb-left">
      <button class="back-topbtn" onclick="showScreen('s-list');renderModuleList()">

function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function effNote(penPts,max,count){return Math.max(0,max-count*penPts);}
function barColor(pct){if(pct>=0.8)return'#22c55e';if(pct>=0.6)return'#60a5fa';if(pct>=0.5)return'#f59e0b';return'#ef4444';}

function collectFormMeta(){
  const nom=document.getElementById('f-nom').value.trim()||'Inconnu';
  const date=document.getElementById('f-date').value||todayISO();
  const testeur=document.getElementById('f-testeur').value||'—';
  const dossier=document.getElementById('f-dossier').value||date+'-'+currentModule.dossierSuffix;
  const extra={};currentModule.extraFields.forEach(ef=>{const el=document.getElementById('f-extra-'+ef.id);if(el)extra[ef.id]=el.value;});
  const snap={};const mod=currentModule;
  const groups=mod.themes?mod.groups.filter(g=>formThemes[g.themeId]):mod.groups;
  let grandTotal=0,allOk=true;
  groups.forEach(g=>{
    let tot=0;
    g.criteria.forEach(c=>{const note=effNote(c.penPts,c.max,formPenalties[c.id]||0);snap[c.id]={note,penalties:formPenalties[c.id]||0};tot+=note;});
    snap['st_'+g.id]=tot;grandTotal+=tot;if(tot<g.seuil)allOk=false;
  });
  if(mod.seuilGlobal&&grandTotal<mod.seuilGlobal)allOk=false;
  const admis=allOk&&groups.length>0;
  const themes=mod.themes?{...formThemes}:null;
  const grandMax=groups.reduce((s,g)=>s+g.criteria.reduce((ss,c)=>ss+c.max,0),0);
  const scoreLabel=grandMax?`${grandTotal}/${grandMax}`:'';
  const filename=`${dossier}_${nom.replace(/\s+/g,'_')}.pdf`;
  return{nom,date,testeur,dossier,extra,snap,themes,admis,scoreLabel,filename};
}

/* ════════════════════════════════════════
   MOTEUR PDF GÉNÉRIQUE
════════════════════════════════════════ */
async function buildGenericPDF(meta){
  const{PDFDocument,StandardFonts,rgb}=PDFLib;
  const mod=currentModule,ph=mod.pdfPageSize.h;
  const pdfDoc=await PDFDocument.load(await(await fetch(mod.pdfTemplate)).arrayBuffer());
  const page=pdfDoc.getPages()[0];
  const fontB=await pdfDoc.embedFont(StandardFonts.HelveticaBold);
  const fontR=await pdfDoc.embedFont(StandardFonts.Helvetica);
  function draw(key,text,bold){
    const f=mod.pdfFields[key];if(!f||!text)return;
    const sf=bold?fontB:fontR;
    const tw=sf.widthOfTextAtSize(text,f.size);
    const tx=f.align==='center'?f.x+(f.w-tw)/2:f.x+2;
    const ty=ph-f.y-f.h/2-f.size*0.35;
    page.drawText(text,{x:tx,y:ty,size:f.size,font:sf,color:rgb(0,0,0)});
  }
  draw('nom',meta.nom,false);
  draw('date',meta.date.split('-').reverse().join('/'),false);
  draw('testeur',meta.testeur,false);
  mod.extraFields.forEach(ef=>{if(meta.extra[ef.id])draw(ef.id,meta.extra[ef.id],false);});
  // Notes critères
  const activeGroups=mod.themes?mod.groups.filter(g=>meta.themes&&meta.themes[g.themeId]):mod.groups;
  activeGroups.forEach(g=>{
    g.criteria.forEach(c=>{if(meta.snap[c.id]!=null)draw(c.id,String(meta.snap[c.id].note),true);});
    if(meta.snap['st_'+g.id]!=null)draw('st_'+g.id,String(meta.snap['st_'+g.id]),true);
  });
  // Total global (TH)
  if(mod.pdfFields.total){
    const tot=activeGroups.reduce((s,g)=>s+g.criteria.reduce((ss,c)=>ss+(meta.snap[c.id]?meta.snap[c.id].note:0),0),0);
    draw('total',String(tot),true);
  }
  draw(meta.admis?'admis':'refuse','X',true);
  // Testeur — déclaré ici pour être utilisable dans tous les blocs suivants
  const to=testeurs.find(t=>`${t.prenom} ${t.nom}`.trim()===meta.testeur.trim()||t.prenom===meta.testeur.trim());
  // Champs admis/refuse additionnels (ex: R490 télécommande)
  if(mod.themes){
    const tcTheme = mod.themes.find(th=>th.id==='telecom');
    if(tcTheme && meta.themes && meta.themes['telecom']){
      const tcGroups = mod.groups.filter(g=>g.themeId==='telecom');
      const tcOk = tcGroups.every(g=>{
        const tot=g.criteria.reduce((s,c)=>s+(meta.snap[c.id]?meta.snap[c.id].note:0),0);
        return tot>=g.seuil;
      });
      if(mod.pdfFields.admis_tc) draw(tcOk?'admis_tc':'refuse_tc','X',true);
      tcGroups.forEach(g=>{if(meta.snap['st_'+g.id]!=null)draw('st_'+g.id,String(meta.snap['st_'+g.id]),true);});
      if(mod.pdfFields.st_telecom){
        const tcTot=tcGroups.reduce((s,g)=>s+(meta.snap['st_'+g.id]||0),0);
        draw('st_telecom',String(tcTot),true);
      }
      if(mod.pdfFields.testeur_tc) draw('testeur_tc',meta.testeur,false);
      if(to&&to.signature&&mod.pdfFields.sig_tc){
        try{
          const f=mod.pdfFields.sig_tc;
          const si2=await pdfDoc.embedPng(await(await fetch(to.signature)).arrayBuffer());
          const sd2=si2.scale(1),ratio2=Math.min(f.w/sd2.width,f.h/sd2.height);
          const sw2=sd2.width*ratio2,sh2=sd2.height*ratio2;
          page.drawImage(si2,{x:f.x+(f.w-sw2)/2,y:ph-f.y-f.h+(f.h-sh2)/2,width:sw2,height:sh2});
        }catch(e){}
      }
    }
    if(meta.themes['poste']){
      const pfGroups=mod.groups.filter(g=>g.themeId==='poste');
      if(mod.pdfFields.st_poste){
        const pfTot=pfGroups.reduce((s,g)=>s+(meta.snap['st_'+g.id]||0),0);
        draw('st_poste',String(pfTot),true);
      }
    }
  }
  // Signature principale
  if(to&&to.signature&&mod.pdfFields.sig){
    try{
      const f=mod.pdfFields.sig;
      const si=await pdfDoc.embedPng(await(await fetch(to.signature)).arrayBuffer());
      const sd=si.scale(1),ratio=Math.min(f.w/sd.width,f.h/sd.height);
      const sw=sd.width*ratio,sh=sd.height*ratio;
      page.drawImage(si,{x:f.x+(f.w-sw)/2,y:ph-f.y-f.h+(f.h-sh)/2,width:sw,height:sh});
    }catch(e){console.warn(e);}
  }
  const bytes=new Uint8Array(await pdfDoc.save());
  let bin='';const chunk=8192;for(let i=0;i<bytes.length;i+=chunk)bin+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  return 'data:application/pdf;base64,'+btoa(bin);
}

function saveFormDraft(){

async function finalizeForm(){
  if(!document.getElementById('f-nom').value.trim())return;
  const btn=document.getElementById('f-save-btn');btn.disabled=true;btn.textContent='Génération PDF...';
  try{
    const meta=collectFormMeta();const pdfData=await buildGenericPDF(meta);
    upsertTest({...meta,status:'pending',pdfData});saveLocal();toast(`Test "${meta.nom}" finalisé`);
    showScreen('s-list');renderModuleList();
  }catch(e){toast('Erreur: '+e.message);}
  finally{btn.disabled=false;btn.textContent='Finaliser';updateFormSaveBtn();}
}
async function previewFormPDF(){
  if(!document.getElementById('f-nom').value.trim()){toast('Renseignez le nom du candidat');return;}
  const btn=document.querySelector('[onclick="previewFormPDF()"]');if(btn){btn.disabled=true;btn.textContent='...';}
  try{
    const uri=await buildGenericPDF(collectFormMeta());
    const win=window.open('','_blank');
    if(win){win.document.write(`<html><body style="margin:0"><iframe src="${uri}" style="width:100%;height:100vh;border:none"></iframe></body></html>`);win.document.close();}
    else{const a=document.createElement('a');a.href=uri;a.download='apercu.pdf';a.click();}
  }catch(e){toast('Erreur: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='Aperçu';}}
}
function upsertTest(data){
  const tests=[...moduleTests()];
  if(editingId){const i=tests.findIndex(t=>t.id===editingId);if(i!==-1){tests[i]={...tests[i],...data};setModuleTests(tests);return;}}
  tests.push({id:Date.now(),...data});setModuleTests(tests);
}

/* ════════════════════════════════════════
   DRIVE OAUTH
════════════════════════════════════════ */
function handleDriveAuth(){if(driveToken){disconnectDrive();return;}window.location.href=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(CLIENT_ID)}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}&prompt=consent`;}
function checkOAuthCallback(){
  const hash=window.location.hash;if(!hash.includes('access_token'))return;
  const token=new URLSearchParams(hash.replace('#','')).get('access_token');if(!token)return;
  driveToken=token;window.history.replaceState(null,'',window.location.pathname);
  fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${driveToken}`}}).then(r=>r.json()).then(d=>{driveUser=d.email||d.name||'Connecté';updateAllDriveBars();saveLocal();}).catch(()=>{driveUser='Connecté';updateAllDriveBars();saveLocal();});
  toast('Google Drive connecté !');saveLocal();updateAllDriveBars();
}
function disconnectDrive(){driveToken=null;driveUser=null;updateAllDriveBars();saveLocal();toast('Drive déconnecté');}
function updateListDriveBar(){
  const txt=document.getElementById('list-drive-txt'),name=document.getElementById('list-drive-name'),btn=document.getElementById('list-drive-btn');if(!txt)return;
  if(driveToken){txt.textContent='Google Drive connecté';name.textContent=driveUser||'';name.style.display=driveUser?'block':'none';btn.textContent='Déconnecter';btn.className='drive-connect-btn connected';}
  else{txt.textContent='Google Drive non connecté';name.style.display='none';btn.textContent='Connecter';btn.className='drive-connect-btn';}
  renderSendAllBtn();
}
function updateAllDriveBars(){updateListDriveBar();}

/* ════════════════════════════════════════
   DRIVE API + SYNC
════════════════════════════════════════ */
async function driveReq(url,opt={}){if(!driveToken)throw new Error('Non authentifié');const h={Authorization:`Bearer ${driveToken}`,...(opt.headers||{})};const r=await fetch(url,{...opt,headers:h});if(r.status===401){disconnectDrive();throw new Error('Token expiré');}return r;}
async function findOrCreateFolder(name,parentId){const q=encodeURIComponent(`name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`);const r=await driveReq(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);const d=await r.json();if(d.files&&d.files.length>0)return d.files[0].id;const cr=await driveReq('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,mimeType:'application/vnd.google-apps.folder',parents:[parentId]})});return(await cr.json()).id;}
async function uploadPDF(blob,filename,folderId){const m={name:filename,parents:[folderId],mimeType:'application/pdf'};const f=new FormData();f.append('metadata',new Blob([JSON.stringify(m)],{type:'application/json'}));f.append('file',blob);return(await driveReq('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',{method:'POST',body:f})).json();}
/* ════════════════════════════════════════
   ENVOI GROUPÉ : DRIVE + GMAIL
════════════════════════════════════════ */
function renderSendAllBtn(){
  const btn=document.getElementById('send-all-btn');
  if(!btn)return;
  const pending=moduleTests().filter(t=>['pending','error'].includes(t.status));
  btn.style.display=(pending.length>0&&driveToken)?'block':'none';
  const count=pending.length;
  btn.textContent=`Envoyer ${count} PDF${count>1?'s':''} sur Drive & par mail`;
}

async function sendAll(){
  if(isSyncing||!isOnline||!driveToken)return;
  const pending=moduleTests().filter(t=>['pending','error'].includes(t.status));
  if(!pending.length){toast('Aucun test en attente');return;}

  const btn=document.getElementById('send-all-btn');
  btn.disabled=true;
  const bar=document.getElementById('list-sync-bar');
  bar.style.display='flex';
  document.getElementById('list-sync-msg').textContent=`Envoi de ${pending.length} PDF(s)...`;
  isSyncing=true;

  let driveOk=0, mailOk=0, mailSkipped=0, errors=[];

  for(const t of pending){
    t.status='syncing'; renderListTests();
    try{
      // 1. Upload Drive
      const folderId=await findOrCreateFolder(t.dossier,ROOT_FOLDER);
      const blob=await(await fetch(t.pdfData)).blob();
      await uploadPDF(blob,t.filename,folderId);
      driveOk++;

      // 2. Email via Gmail API
      const testeurObj=testeurs.find(te=>`${te.prenom} ${te.nom}`.trim()===t.testeur||te.prenom===t.testeur);
      const toEmail=testeurObj?.email||'';
      if(toEmail){
        try{ await sendGmail(toEmail,t); mailOk++; }
        catch(e){ errors.push(`Mail ${t.nom}: ${e.message}`); }
      } else { mailSkipped++; }

      t.status='synced';
    }catch(e){
      t.status='error';
      errors.push(`Drive ${t.nom}: ${e.message}`);
    }
    saveLocal(); renderListTests();
  }

  isSyncing=false;
  bar.style.display='none';
  btn.disabled=false;
  renderModuleList();

  let msg=`${driveOk} PDF${driveOk>1?'s':''} envoyé${driveOk>1?'s':''} sur Drive`;
  if(mailOk>0) msg+=`, ${mailOk} mail${mailOk>1?'s':''} envoyé${mailOk>1?'s':''}`;
  if(mailSkipped>0) msg+=` (${mailSkipped} sans email)`;
  if(errors.length) msg+=` — ${errors.length} erreur${errors.length>1?'s':''}`;
  toast(msg);
}

async function sendGmail(toEmail, test){
  // Construire l'email multipart avec le PDF en pièce jointe
  const subject=`Résultat test pratique — ${test.nom} — ${test.date}`;
  const body=`Bonjour,\n\nVeuillez trouver en pièce jointe le résultat du test pratique de ${test.nom} du ${test.date}.\n\nRésultat : ${test.admis?'ADMIS':'REFUSÉ'}\n\nCordialement,\nS2 Formation`;

  // Convertir pdfData (base64 data URI) en base64 pur
  const pdfBase64=test.pdfData.split(',')[1];

  // Construire le message MIME multipart
  const boundary='s2formation_boundary_'+Date.now();
  const mime=[
    `MIME-Version: 1.0`,
    `To: ${toEmail}`,
    `Subject: =?UTF-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,
    `Content-Type: multipart/mixed; boundary="${boundary}"`,
    ``,
    `--${boundary}`,
    `Content-Type: text/plain; charset="UTF-8"`,
    `Content-Transfer-Encoding: quoted-printable`,
    ``,
    body,
    ``,
    `--${boundary}`,
    `Content-Type: application/pdf; name="${test.filename}"`,
    `Content-Disposition: attachment; filename="${test.filename}"`,
    `Content-Transfer-Encoding: base64`,
    ``,
    pdfBase64,
    ``,
    `--${boundary}--`,
  ].join('\r\n');

  // Encoder en base64url pour l'API Gmail
  const encoded=btoa(unescape(encodeURIComponent(mime)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');

  const res=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
    method:'POST',
    headers:{Authorization:`Bearer ${driveToken}`,'Content-Type':'application/json'},
    body:JSON.stringify({raw:encoded}),
  });
  if(!res.ok){
    const err=await res.json();
    throw new Error(err.error?.message||'Erreur Gmail');
  }
}

async function startSync(){ await sendAll(); } // compatibilité

function updateConn(online){
  isOnline=online;
  ['home','list','form'].forEach(s=>{const p=document.getElementById('cp-'+s),l=document.getElementById('cl-'+s);if(!p)return;p.className='conn-pill '+(online?'online':'offline');l.textContent=online?'En ligne':'Hors ligne';});

}

function fillTesteurSelect(selId,cur){const sel=document.getElementById(selId);if(!sel)return;sel.innerHTML='<option value="">— Sélectionner —</option>';testeurs.forEach(t=>{const val=`${t.prenom} ${t.nom}`.trim();const opt=document.createElement('option');opt.value=val;opt.textContent=val;if(val===cur)opt.selected=true;sel.appendChild(opt);});}
function renderTesteurs(){const el=document.getElementById('testeurs-list');if(!testeurs.length){el.innerHTML='<div class="empty-state">Aucun testeur.</div>';return;}el.innerHTML='';testeurs.forEach(t=>{const d=document.createElement('div');d.className='testeur-card';d.onclick=()=>openEditTesteur(t.id);const ini=((t.prenom?t.prenom[0]:'')+(t.nom?t.nom[0]:'')).toUpperCase();const sh=t.signature?`<img src="${t.signature}" class="sig-preview" alt="sig"/>`:`<div class="sig-placeholder">Pas de sig.</div>`;d.innerHTML=`<div class="testeur-avatar">${ini}</div><div class="testeur-info"><div class="testeur-name">${t.prenom||''} ${t.nom||''}</div><div class="testeur-sig">${t.email?t.email:(t.signature?'Signature enregistrée':'Aucun email ni signature')}</div></div>${sh}`;el.appendChild(d);});}
function openNewTesteur(){editingTesteurId=null;document.getElementById('t-prenom').value='';document.getElementById('t-nom').value='';document.getElementById('t-email').value='';document.getElementById('testeur-edit-title').textContent='Nouveau testeur';document.getElementById('testeur-del-btn').style.display='none';showScreen('s-testeur-edit');initSigPad();}
function openEditTesteur(id){const t=testeurs.find(x=>x.id===id);if(!t)return;editingTesteurId=id;document.getElementById('t-prenom').value=t.prenom||'';document.getElementById('t-nom').value=t.nom||'';document.getElementById('t-email').value=t.email||'';document.getElementById('testeur-edit-title').textContent='Modifier';document.getElementById('testeur-del-btn').style.display='block';showScreen('s-testeur-edit');initSigPad(t.signature);}
function saveTesteur(){const p=document.getElementById('t-prenom').value.trim(),n=document.getElementById('t-nom').value.trim(),em=document.getElementById('t-email').value.trim();if(!p&&!n){toast('Renseignez au moins le prénom ou le nom');return;}const sig=sigHasData?sigCanvas.toDataURL('image/png'):(editingTesteurId?testeurs.find(x=>x.id===editingTesteurId)?.signature||null:null);if(editingTesteurId){const i=testeurs.findIndex(x=>x.id===editingTesteurId);if(i!==-1)testeurs[i]={...testeurs[i],prenom:p,nom:n,email:em,signature:sig};}else testeurs.push({id:Date.now(),prenom:p,nom:n,email:em,signature:sig});saveLocal();toast(`${p} ${n} enregistré`);showScreen('s-testeurs');renderTesteurs();}
function deleteTesteur(){if(!editingTesteurId)return;const t=testeurs.find(x=>x.id===editingTesteurId);testeurs=testeurs.filter(x=>x.id!==editingTesteurId);saveLocal();toast(`${t?t.prenom+' '+t.nom:''} supprimé`);showScreen('s-testeurs');renderTesteurs();}

/* ════════════════════════════════════════
   PAD SIGNATURE
════════════════════════════════════════ */
function initSigPad(ex){sigCanvas=document.getElementById('sig-canvas');if(!sigCanvas)return;sigCanvas.width=sigCanvas.parentElement.clientWidth-28||320;sigCanvas.height=160;sigCtx=sigCanvas.getContext('2d');sigCtx.fillStyle='#fff';sigCtx.fillRect(0,0,sigCanvas.width,sigCanvas.height);sigCtx.strokeStyle='#0d1f35';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round';sigHasData=false;document.getElementById('sig-status').textContent='Signez dans la zone blanche';if(ex){const img=new Image();img.onload=()=>{sigCtx.drawImage(img,0,0,sigCanvas.width,sigCanvas.height);sigHasData=false;document.getElementById('sig-status').textContent='Signature existante';};img.src=ex;}['touchstart','mousedown'].forEach(ev=>sigCanvas.addEventListener(ev,sS,{passive:false}));['touchmove','mousemove'].forEach(ev=>sigCanvas.addEventListener(ev,sM,{passive:false}));['touchend','mouseup','mouseleave'].forEach(ev=>sigCanvas.addEventListener(ev,()=>{sigDrawing=false;}));}
function getPos(e){const r=sigCanvas.getBoundingClientRect(),sx=sigCanvas.width/r.width,sy=sigCanvas.height/r.height,src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};}
function sS(e){e.preventDefault();sigDrawing=true;const p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);}
function sM(e){e.preventDefault();if(!sigDrawing)return;const p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasData=true;document.getElementById('sig-status').textContent='Signature saisie ✓';}
function clearSig(){if(!sigCtx)return;sigCtx.fillStyle='#fff';sigCtx.fillRect(0,0,sigCanvas.width,sigCanvas.height);sigHasData=false;document.getElementById('sig-status').textContent='Signez dans la zone blanche';}

/* ════════════════════════════════════════
   STOCKAGE
════════════════════════════════════════ */
function saveLocal(){try{localStorage.setItem('s2_tests_v2',JSON.stringify(allTests));localStorage.setItem('s2_drive',JSON.stringify({token:driveToken,user:driveUser}));localStorage.setItem('s2_testeurs',JSON.stringify(testeurs));}catch(e){}}
function loadLocal(){
  try{
    const t=localStorage.getItem('s2_tests_v2');
    if(t)allTests=JSON.parse(t);
    else{const oth=localStorage.getItem('s2_tests'),oec=localStorage.getItem('s2_echaf_tests');if(oth)allTests.TH=JSON.parse(oth);if(oec)allTests.ECHAF=JSON.parse(oec);}
    const d=localStorage.getItem('s2_drive');if(d){const{token,user}=JSON.parse(d);driveToken=token;driveUser=user;}
    const te=localStorage.getItem('s2_testeurs');if(te)testeurs=JSON.parse(te);else testeurs=[{id:1,prenom:'Erwan',nom:'',signature:null},{id:2,prenom:'Stéphane',nom:'',signature:null},{id:3,prenom:'Théo',nom:'',signature:null}];
  }catch(e){}
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
loadLocal();updateConn(navigator.onLine);checkOAuthCallback();updateAllDriveBars();

/* ════════════════════════════════════════
   EVENT LISTENERS ROBUSTES (iPad/iOS fix)
   touchend prévient le délai de 300ms et
   les problèmes de capture dans scroll
════════════════════════════════════════ */
function bindBtn(id, fn){
  const el=document.getElementById(id);
  if(!el)return;
  let touching=false;
  el.addEventListener('touchstart',()=>{touching=true;},{passive:true});
  el.addEventListener('touchend',function(e){
    if(!touching)return;
    touching=false;
    e.preventDefault();
    fn();
  },{passive:false});
  el.addEventListener('click',function(){
    if(touching)return; // déjà géré par touchend
    fn();
  });
}

bindBtn('btn-th',    ()=>openModule('TH'));
bindBtn('btn-echaf', ()=>openModule('ECHAF'));
bindBtn('btn-testeurs', ()=>{ showScreen('s-testeurs'); renderTesteurs(); });
